<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Untuk Tina ❤️ Premium Cinematic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 200% 200%;
            animation: bgWave 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            perspective: 1200px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes bgWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle canvas (floating hearts & stars) */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Hujan emoji ringan */
        .rain-emoji {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .rain-emoji span {
            position: absolute;
            font-size: 1.2rem;
            animation: fall linear infinite;
            opacity: 0.4;
            will-change: transform;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* Kartu utama glassmorphism mewah */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 70px;
            padding: 30px 25px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.2s ease;
            transform-style: preserve-3d;
        }

        /* Transisi cinematic (fade + scale + blur) */
        .page {
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), filter 0.5s;
            will-change: opacity, transform, filter;
        }
        .page.hidden {
            display: none;
        }
        .fade-out {
            opacity: 0 !important;
            transform: translateY(20px) scale(0.96) !important;
            filter: blur(4px) !important;
            pointer-events: none;
        }
        .fade-in {
            opacity: 1 !important;
            transform: translateY(0) scale(1) !important;
            filter: blur(0) !important;
        }

        /* Tombol premium */
        .btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493, #1e90ff);
            border: none;
            padding: 14px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            display: inline-block;
            margin: 20px auto 10px;
            width: fit-content;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3), 0 0 10px rgba(255,105,180,0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn:active {
            transform: scale(0.96);
        }

        /* Stiker bergerak */
        .sticker {
            display: inline-block;
            font-size: 2rem;
            margin: 5px;
            filter: drop-shadow(2px 2px 6px rgba(0,0,0,0.3));
            animation: floatSticker 2s infinite alternate;
            will-change: transform;
        }
        @keyframes floatSticker {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-8px) rotate(3deg); }
        }

        /* Amplop ikon 💌 dengan efek 3D */
        .envelope-icon {
            font-size: 8rem;
            text-align: center;
            cursor: pointer;
            margin: 20px 0;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
            transition: transform 0.3s ease, filter 0.2s;
            transform-style: preserve-3d;
            display: inline-block;
        }
        .envelope-icon:hover {
            transform: scale(1.05) translateZ(20px);
            filter: drop-shadow(0 0 20px #ff69b4);
        }

        /* Surat yang keluar dari amplop secara fisik (3D) */
        .letter-paper {
            background: #fffef7;
            border-radius: 30px;
            padding: 25px;
            margin-top: 20px;
            text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform-origin: center;
            animation: paperPop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes paperPop {
            0% { opacity: 0; transform: scale(0.5) rotateX(-30deg) translateY(80px); }
            60% { opacity: 1; transform: scale(1.02) rotateX(5deg) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) rotateX(0deg) translateY(0); }
        }

        /* Kotak kado dengan efek cahaya */
        .gift-box {
            width: 180px;
            height: 180px;
            background: linear-gradient(145deg, #ffb347, #ff7e05);
            margin: 20px auto;
            position: relative;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.5);
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }
        .gift-box::after {
            content: "🎁";
            font-size: 4rem;
        }
        .gift-box.open {
            transform: scale(1.05) rotateY(10deg);
            background: #ffd966;
            box-shadow: 0 0 30px rgba(255,215,0,0.8);
        }

        /* Foto dengan efek apung dan glow */
        .photo-wrapper {
            position: relative;
            margin: 20px auto;
            width: fit-content;
        }
        .photo {
            width: 100%;
            max-width: 280px;
            border-radius: 40px;
            display: block;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4), 0 0 0 3px white;
            transition: transform 0.3s ease;
            animation: floatPhoto 3s infinite alternate;
            will-change: transform;
        }
        @keyframes floatPhoto {
            from { transform: translateY(0px) rotateY(0deg); }
            to { transform: translateY(-8px) rotateY(5deg); }
        }
        .floating-emoji {
            position: absolute;
            font-size: 1.6rem;
            animation: orbit 3s linear infinite;
            pointer-events: none;
            filter: drop-shadow(0 0 5px gold);
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(60px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
        }

        /* Beruang love 3D */
        .bear-love {
            font-size: 6rem;
            cursor: pointer;
            display: inline-block;
            margin: 20px;
            animation: bounce 1s infinite;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            transition: transform 0.2s;
            transform-style: preserve-3d;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-12px); }
        }

        /* Heart 3D berotasi */
        .heart-3d {
            width: 100px;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="red"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat center;
            background-size: contain;
            margin: 20px auto;
            animation: rotate3d 2s infinite;
        }
        @keyframes rotate3d {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .message-box {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 18px;
            border-radius: 50px;
            margin: 20px 0;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            display: flex;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        footer {
            margin-top: 25px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            text-align: center;
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="rain-emoji" id="rainEmoji"></div>

<div class="card" id="mainCard">
    <!-- Page 1: Welcome -->
    <div id="page1" class="page" style="text-align: center; opacity: 1;">
        <div>
            <span class="sticker">🐼💖</span>
            <span class="sticker">🌸🌼</span>
            <span class="sticker">💌✨</span>
            <span class="sticker">😘🥰</span>
        </div>
        <h1 style="color: white; font-size: 2rem; margin: 20px 0;">✨ Welcome Tinaa Sayang ✨</h1>
        <div>
            <span class="sticker">🫶💕</span>
            <span class="sticker">🐣💛</span>
            <span class="sticker">💋❤️</span>
        </div>
        <button id="next1" class="btn">📬 Next 📬</button>
    </div>

    <!-- Page 2: Amplop 💌 -->
    <div id="page2" class="page hidden" style="text-align: center;">
        <div><span class="sticker">💌✨</span><span class="sticker">📦🎁</span><span class="sticker">💘💖</span></div>
        <div class="envelope-icon" id="envelopeIcon">💌</div>
        <button id="openEnvelopeBtn" class="btn">💌 buka ini ya sayang 💌</button>
        <div id="letterContainer" style="display:none; margin-top: 20px;"></div>
    </div>

    <!-- Page 3: Kado + foto -->
    <div id="page3" class="page hidden" style="text-align: center;">
        <div><span class="sticker">🎀🎁</span><span class="sticker">💝💕</span></div>
        <div id="giftBox" class="gift-box"></div>
        <div id="photoContainer" style="display:none;">
            <div class="photo-wrapper" id="photoWrapper">
                <img src="foto.jpg" alt="Foto Tina" class="photo" onerror="this.src='https://placehold.co/400x400?text=Foto+Tina'">
            </div>
            <div class="message-box">cantik banget sih just friend akuuu 😍💖</div>
            <button id="next3" class="btn">✨ Next ✨</button>
        </div>
    </div>

    <!-- Page 4: Beruang love & selesai -->
    <div id="page4" class="page hidden" style="text-align: center;">
        <div><span class="sticker">🐻‍❄️❤️</span><span class="sticker">🧸💕</span></div>
        <div class="bear-love" id="bearLove">🐻‍❄️❤️</div>
        <div id="bearMessage" style="display:none;">
            <div class="message-box">lucuu banget kayaa kamu 🥰🐻‍❄️</div>
            <button id="bearNext" class="btn">💖 buka lagi sayang 💖</button>
        </div>
        <div id="secondMessage" style="display:none;">
            <div class="message-box">dari Ganny untuk just friend aku tina 💌✨</div>
            <button id="secondNext" class="btn">💕 plis buka lagi sayang 💕</button>
        </div>
        <div id="anim3dContainer" style="display:none;">
            <div class="heart-3d"></div>
            <p id="finalText" style="color:white; margin-top:20px; display:none;">Yeayy selesai sayangg 🎉💖</p>
        </div>
        <footer>💖 Dari Ganny untuk Tina 💖</footer>
    </div>
</div>

<div class="music-btn" id="musicControl">
    🎵 Audio 🎵 <span id="musicIcon">🔊</span>
</div>
<audio id="bgMusic" src="myheart.mp3" preload="auto" loop></audio>

<script>
    (function(){
        // ==================== PARTICLE EFFECT (Floating hearts) ====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        let particles = [];
        const PARTICLE_COUNT = 35;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class HeartParticle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 15 + 8;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = Math.random() * 0.8 + 0.3;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.char = ['❤️','💖','💕','💘'][Math.floor(Math.random()*4)];
            }
            update() {
                this.x += this.speedX;
                this.y -= this.speedY;
                if (this.y < -20) this.y = height + 20;
                if (this.x < -20) this.x = width + 20;
                if (this.x > width + 20) this.x = -20;
            }
            draw() {
                ctx.font = `${this.size}px "Segoe UI Emoji"`;
                ctx.globalAlpha = this.opacity;
                ctx.fillText(this.char, this.x, this.y);
            }
        }
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new HeartParticle());
        }
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ==================== HUJAN EMOJI (ringan) ====================
        const rainContainer = document.getElementById('rainEmoji');
        const emojis = ['❤️','💖','🌸','🐼','💕','✨','🌹','😘','🎀'];
        for(let i=0;i<30;i++){
            let drop = document.createElement('span');
            drop.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
            drop.style.left = Math.random()*100+'%';
            drop.style.animationDuration = (Math.random()*2+2)+'s';
            drop.style.animationDelay = Math.random()*5+'s';
            drop.style.fontSize = (Math.random()*18+12)+'px';
            drop.style.opacity = Math.random()*0.5+0.2;
            rainContainer.appendChild(drop);
        }

        // ==================== MUSIK ====================
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        let musicStarted = false;
        function toggleMusic(){
            if(bgMusic.paused){
                bgMusic.play().catch(e=>console.log);
                musicIcon.innerHTML='🔇';
            } else {
                bgMusic.pause();
                musicIcon.innerHTML='🔊';
            }
        }
        document.getElementById('musicControl').addEventListener('click', toggleMusic);

        // ==================== TRANSISI HALAMAN ====================
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const page3 = document.getElementById('page3');
        const page4 = document.getElementById('page4');
        const next1 = document.getElementById('next1');
        const next3Btn = document.getElementById('next3');
        const openEnvelopeBtn = document.getElementById('openEnvelopeBtn');
        const envelopeIcon = document.getElementById('envelopeIcon');
        const letterContainer = document.getElementById('letterContainer');
        const giftBox = document.getElementById('giftBox');
        const photoContainer = document.getElementById('photoContainer');
        const bearLove = document.getElementById('bearLove');
        const bearMessageDiv = document.getElementById('bearMessage');
        const secondMsgDiv = document.getElementById('secondMessage');
        const anim3d = document.getElementById('anim3dContainer');
        const finalTextSpan = document.getElementById('finalText');

        function transitionToPage(current, next, callback){
            current.classList.add('fade-out');
            setTimeout(() => {
                current.classList.add('hidden');
                current.classList.remove('fade-out');
                next.classList.remove('hidden');
                next.classList.add('fade-in');
                setTimeout(() => {
                    next.classList.remove('fade-in');
                    if(callback) callback();
                }, 500);
            }, 500);
        }

        // Next 1 -> 2
        next1.addEventListener('click', ()=>{
            if(!musicStarted){ bgMusic.play(); musicStarted=true; musicIcon.innerHTML='🔇'; }
            transitionToPage(page1, page2);
        });

        // Buka amplop: surat keluar secara fisik (animasi 3D)
        openEnvelopeBtn.addEventListener('click', ()=>{
            envelopeIcon.style.display = 'none';
            openEnvelopeBtn.style.display = 'none';
            const paperDiv = document.createElement('div');
            paperDiv.className = 'letter-paper';
            paperDiv.innerHTML = `
                <div style="text-align:center;">
                    <span class="sticker">📜💌</span> <span class="sticker">🐼💕</span>
                    <p style="margin-top:10px;">ekhm, hayy sayang apa kabar? akuu buatin lagi nih hhehe.<br>
                    maaff yaa kalau masih ada kurangnya. Kalau kamu mau cerita, langsung cerita aja ya.<br>
                    Apapun ceritanya dan kapanpun waktunya, aku bakal dengerin. 🌸✨</p>
                    <span class="sticker">😘💖</span> <span class="sticker">🌸🌺</span>
                    <button id="next2AfterPaper" class="btn" style="margin-top:15px;">✨ Next ✨</button>
                </div>
            `;
            letterContainer.appendChild(paperDiv);
            letterContainer.style.display = 'block';
            document.getElementById('next2AfterPaper').addEventListener('click', ()=>{
                transitionToPage(page2, page3);
            });
        });

        // Buka kado: foto muncul dengan emoji orbit
        giftBox.addEventListener('click', ()=>{
            giftBox.classList.add('open');
            giftBox.style.opacity = '0';
            setTimeout(()=>{
                photoContainer.style.display = 'block';
                const wrapper = document.getElementById('photoWrapper');
                const orbitEmojis = ['❤️','💖','🌸','🐼','💕','✨','🌹','😘'];
                for(let i=0; i<8; i++){
                    let em = document.createElement('div');
                    em.className = 'floating-emoji';
                    em.innerHTML = orbitEmojis[i % orbitEmojis.length];
                    em.style.position = 'absolute';
                    em.style.left = 'calc(50% - 15px)';
                    em.style.top = 'calc(50% - 15px)';
                    const angle = (i * 45) * Math.PI/180;
                    const radius = 70;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);
                    em.style.transform = `translate(${x}px, ${y}px)`;
                    em.style.animation = `orbit 3s linear infinite`;
                    wrapper.appendChild(em);
                }
            }, 300);
        });

        // Next 3 -> 4
        next3Btn.addEventListener('click', ()=>{
            transitionToPage(page3, page4);
        });

        // Beruang love
        bearLove.addEventListener('click', ()=>{
            bearLove.style.animation = 'none';
            bearMessageDiv.style.display = 'block';
        });
        document.getElementById('bearNext').addEventListener('click', ()=>{
            bearMessageDiv.style.display = 'none';
            secondMsgDiv.style.display = 'block';
        });
        document.getElementById('secondNext').addEventListener('click', ()=>{
            secondMsgDiv.style.display = 'none';
            anim3d.style.display = 'block';
            setTimeout(()=>{
                finalTextSpan.style.display = 'block';
            }, 3000);
        });

        // Efek 3D pada card mengikuti gerakan mouse (ringan)
        const card = document.querySelector('.card');
        let mouseX = 0, mouseY = 0;
        document.body.addEventListener('mousemove', (e)=>{
            mouseX = (e.clientX / window.innerWidth - 0.5)*4;
            mouseY = (e.clientY / window.innerHeight - 0.5)*4;
            card.style.transform = `rotateX(${mouseY}deg) rotateY(${mouseX}deg)`;
        });
        document.body.addEventListener('mouseleave', ()=>{
            card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    })();
</script>
</body>
    </html>
